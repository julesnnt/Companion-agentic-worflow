services:
  - type: web
    name: companion-backend
    env: python
    plan: free
    rootDir: companion/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "false"
